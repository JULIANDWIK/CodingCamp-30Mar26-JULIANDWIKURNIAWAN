<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense & Budget Visualizer</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="wrapper">
        <header class="main-header">
            <h1>Expense & Budget Visualizer</h1>
        </header>

        <div class="card balance-container">
            <p class="label">TOTAL BALANCE</p>
            <h2 id="total-balance">$0.00</h2>
        </div>

        <div class="main-grid">
            <div class="card">
                <h3>Add Transaction</h3>
                <form id="expense-form">
                    <div class="form-group">
                        <label for="item-name">Item Name</label>
                        <input type="text" id="item-name" placeholder="" required>
                    </div>
                    <div class="form-group">
                        <label for="amount">Amount</label>
                        <input type="number" step="0.01" id="amount" placeholder="" required>
                    </div>
                    <div class="form-group">
                        <label for="category">Category</label>
                        <select id="category" required>
                            <option value="Food">Food</option>
                            <option value="Transport">Transport</option>
                            <option value="Fun">Fun</option>
                        </select>
                    </div>
                    <button type="submit" class="btn-submit">Add Transaction</button>
                </form>
            </div>

            <div class="results-grid">
                <div class="card">
                    <h3>Transactions</h3>
                    <div id="transaction-list" class="transaction-list">
                        </div>
                </div>

                <div class="card">
                    <h3>Spending by Category</h3>
                    <div class="chart-box">
                        <canvas id="expenseChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="js/script.js"></script>
</body>
</html>
